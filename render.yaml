# MyMine tout-en-un sur Render (API Socket.io + interface React)
# Dashboard Render → New → Blueprint → repo GitHub
services:
  - type: web
    name: mymine
    runtime: node
    plan: free
    buildCommand: bash scripts/render-build.sh
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
