services:
  - type: web
    name: mymeet-api
    runtime: node
    plan: free
    buildCommand: >-
      pnpm install &&
      pnpm --filter @mymeet/server db:generate &&
      pnpm --filter @mymeet/server db:push &&
      pnpm --filter @mymeet/server build
    startCommand: node apps/server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URLS
        sync: false
      - key: REDIS_URL
        sync: false
